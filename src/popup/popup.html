<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>FocusInk</title>

    <link rel="stylesheet" href="./popup.css" />
  </head>

  <body>
    <main class="popup">
      <header class="popup__header">
        <div>
          <h1>FocusInk</h1>
          <p>Keep your eyes on the words that matter.</p>
        </div>
      </header>

      <section class="setting">
        <div class="setting__content">
          <label for="enabled">Enable FocusInk</label>
          <p>Enhance readable text under your cursor.</p>
        </div>

        <label class="switch">
          <input
            id="enabled"
            type="checkbox"
          />

          <span class="switch__slider"></span>
        </label>
      </section>

      <section class="intensity">
        <label for="intensity">
          Focus intensity
        </label>

        <select id="intensity">
          <option value="light">
            Light
          </option>

          <option value="medium">
            Medium
          </option>

          <option value="strong">
            Strong
          </option>
        </select>
      </section>

      <p
        id="status"
        class="status"
        role="status"
      >
        Loading settings...
      </p>
    </main>

    <script
      src="../../dist/popup/popup.js"
      defer
    ></script>
  </body>
</html>
